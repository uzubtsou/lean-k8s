---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sandpit
  namespace: istio-ingress
  labels:
    sand.pit.im/addon: istio
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: "*.sand.pit.im"
      allowedRoutes:
        namespaces:
          from: All
