apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: lean-k8s
servers: 1
agents: 2
image: rancher/k3s:v1.28.8-k3s1
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: "60s"
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
